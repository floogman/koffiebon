# Koffiebon — nginx vhost voor koffie.klusviewer.nl
#
# De PWA (statische Vite-build) bezit de root; Laravel draait achter PHP-FPM op /api,
# Reverb (websockets, pusher-protocol) op /app + /apps.
#
# Plaats dit als poort-80 server-block en laat certbot de TLS (443) erbij schrijven:
#   sudo ln -s /var/www/koffiebon/deploy/nginx/koffie.klusviewer.nl.conf \
#              /etc/nginx/sites-enabled/koffie.klusviewer.nl.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d koffie.klusviewer.nl
#
# Pas het pad /run/php/php8.3-fpm.sock aan als jouw FPM-pool een andere socket gebruikt.

server {
    listen 80;
    listen [::]:80;
    server_name koffie.klusviewer.nl;

    root /var/www/koffiebon/frontend/dist;
    index index.html;
    charset utf-8;

    # Alleen JSON-API; geen grote uploads nodig.
    client_max_body_size 4m;

    # ---- Laravel API (PHP-FPM) ----
    # Alle /api/* gaan door de Laravel front-controller; routing gebeurt op REQUEST_URI.
    location /api {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /var/www/koffiebon/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/koffiebon/public;
        fastcgi_param HTTPS           $https if_not_empty;
        fastcgi_read_timeout 60s;
    }

    # ---- Reverb websocket (browser -> /app/{key}) ----
    location /app {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- Reverb events-API (Laravel -> /apps/{id}/events) ----
    location /apps {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Service worker / manifest: nooit cachen (anders blijft de app hangen op oude builds) ----
    location = /sw.js                { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /registerSW.js        { add_header Cache-Control "no-cache"; try_files $uri =404; }
    location = /manifest.webmanifest { add_header Cache-Control "no-cache"; try_files $uri =404; }

    # ---- Gehashte assets: lang cachen ----
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ---- PWA SPA-fallback (react-router: /, /claim, /s/:nonce, /balie, /dashboard) ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
